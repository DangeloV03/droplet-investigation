# Slurm settings for json_runner.py --slurm
# Matched to flex-investigation slurm_config.yml (known working on Della).

job_name: droplet_sim
cpus_per_task: 1
mem: 8G
time: "12:00:00"
partition: cpu
# account: your_account   # uncomment if required (flex runs without it)

report_dir: /home/vd7294/slurm_reports
output: "/home/vd7294/slurm_reports/%j.out"
error: "/home/vd7294/slurm_reports/%j.err"

setup_cmds:
  - "module load anaconda3/2024.10"
  - "source \"$(conda info --base)/etc/profile.d/conda.sh\""
  - "conda activate lattice"
  - "export LD_LIBRARY_PATH=\"$CONDA_PREFIX/lib:${LD_LIBRARY_PATH:-}\""
  - "export PYTHONUNBUFFERED=1"

project_root: "/scratch/gpfs/WJACOBS/vd7294/droplet-investigation"
